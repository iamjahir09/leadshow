kind = "web"
previewPath = "/"
title = "Chat Dashboard"
version = "1.0.0"
id = "artifacts/chat-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20492
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/chat-dashboard run dev"

[services.env]
PORT = "20492"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/chat-dashboard", "run", "build"]
publicDir = "artifacts/chat-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
